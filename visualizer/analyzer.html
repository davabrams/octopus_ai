  canvas { image-rendering: pixelcrisp; image-rendering: crisp-edges; }
  .swatch { width: 18px; height: 18px; border: 1px solid #333; display: inline-block;

<!-- ================================================================= -->
<!-- Plain-JS core: pure functions, no JSX, no React. Attached to      -->
<!-- window.AnalyzerCore so they can be unit-tested under node without  -->
<!-- a JS toolchain (tests/test_analyzer_core.py).                      -->
<!-- ================================================================= -->
<script id="analyzer-core">
(function () {
  "use strict";

  function to255(v) {
    return Math.round(Math.max(0, Math.min(1, v)) * 255);
  }

  // A color may be an [r,g,b] triple or a scalar (grayscale). Normalize to a
  // triple with tolerance for either form.
  function asTriple(c) {
    if (Array.isArray(c)) return [c[0], c[1], c[2]];
    return [c, c, c];
  }

  // A tiny LRU keyed by any value. get() refreshes recency; set() evicts the
  // least-recently-used once over capacity.
  function makeLru(cap) {
    const map = new Map();
    return {
      has: (k) => map.has(k),
      get: (k) => {
        if (!map.has(k)) return undefined;
        const v = map.get(k);
        map.delete(k);
        map.set(k, v);
        return v;
      },
      set: (k, v) => {
        if (map.has(k)) map.delete(k);
        map.set(k, v);
        while (map.size > cap) map.delete(map.keys().next().value);
      },
      get size() { return map.size; },
      keys: () => Array.from(map.keys()),
    };
  }

  // Which frame indices to fetch around `current`, windowed and clamped to
  // [0, maxFrame], skipping any the caller already has (hasFn). Ahead-heavy.
  function prefetchPlan(current, maxFrame, ahead, behind, hasFn) {
    const want = [];
    for (let f = current - behind; f <= current + ahead; f++) {
      if (f < 0 || f > maxFrame) continue;
      if (hasFn && hasFn(f)) continue;
      want.push(f);
    }
    // Nearest-first so the visible frame's neighbours load soonest.
    want.sort((a, b) => Math.abs(a - current) - Math.abs(b - current));
    return want;
  }

  // The server sends each iteration's trajectory as nested per-step free-node
  // lists ([[[x,y],...nfree],...steps]); this ONLY prepends the base point to
  // each step's chain (no pairing/reshape — RunStore already reshaped).
  function chainsWithBase(trajectory, base) {
    if (!trajectory) return [];
    return trajectory.map((step) => {
      const chain = [[base.x, base.y]];
      for (const node of step) chain.push([node[0], node[1]]);
      return chain;
    });
  }

  // Index of the sucker nearest world-coords (wx, wy), or -1 if none.
  // Nearest {x,y} to (wx,wy) within maxDist; returns its index in `suckers` (or
  // -1). Optional `filter(s, i)` restricts which entries are eligible (e.g. only
  // the selected limb's suckers) - the returned index is still into `suckers`.
  function nearestSucker(suckers, wx, wy, maxDist, filter) {
    let best = -1, bestD = Infinity;
    for (let i = 0; i < suckers.length; i++) {
      if (filter && !filter(suckers[i], i)) continue;
      const s = suckers[i];
      const d = (s.x - wx) * (s.x - wx) + (s.y - wy) * (s.y - wy);
      if (d < bestD) { bestD = d; best = i; }
    }
    if (maxDist != null && bestD > maxDist * maxDist) return -1;
    return best;
  }

  // Sum of squared per-channel deltas for a sucker (range [0, 3]).
  function colorErrorStats(before, after, target) {
    const b = asTriple(before), a = asTriple(after), t = asTriple(target);
    const sq = (x, y) => (x - y) * (x - y);
    return {
      errBefore: sq(b[0], t[0]) + sq(b[1], t[1]) + sq(b[2], t[2]),
      errAfter: sq(a[0], t[0]) + sq(a[1], t[1]) + sq(a[2], t[2]),
    };
  }

  function clampIdx(i, n) {
    if (n <= 0) return 0;
    return Math.max(0, Math.min(n - 1, i));
  }

  // Next playback index. Advances by `step` (>=1), stops (returns maxFrame and
  // playing=false) at the end unless looping.
  function playbackAdvance(idx, maxFrame, step, loop) {
    const next = idx + (step || 1);
    if (next > maxFrame) {
      return loop ? { idx: 0, playing: true }
                  : { idx: maxFrame, playing: false };
    }
    return { idx: next, playing: true };
  }

  // 8-way arrow glyph for a world-space direction (y is DOWN on the canvas, so
  // +dy reads as "down"); "·" for a zero vector.
  const _ARROWS = ["→", "↘", "↓", "↙", "←", "↖", "↑", "↗"];
  function arrowFor(dx, dy) {
    if (dx === 0 && dy === 0) return "·";
    const oct = ((Math.round(Math.atan2(dy, dx) / (Math.PI / 4)) % 8) + 8) % 8;
    return _ARROWS[oct];
  }
  function angleDeg(dx, dy) {
    if (dx === 0 && dy === 0) return 0;
    return Math.round((Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360);
  }

  // Per-node iLQR cost breakdown for a chain at a given step. chain is
  // [[x,y], ...] including base; cfg has the weights/rest_length/target/threat.
  // Each term returns { cost, dir } where `dir` is a UNIT vector along the force
  // that term exerts on this node (the negative cost gradient) - i.e. the way it
  // pushes the node. cost and dir come from the SAME term so they always agree.
  function nodeCosts(chain, nodeIdx, cfg, isTerminal, vel) {
    const sub = (a, b) => [a[0] - b[0], a[1] - b[1]];
    const norm = (v) => Math.sqrt(v[0] * v[0] + v[1] * v[1]);
    const unit = (v) => { const n = norm(v) || 1; return [v[0] / n, v[1] / n]; };
    const out = {};
    const p = chain[nodeIdx];
    // Effort (translation): the control at this step is the node's per-frame
    // velocity u = x_{t+1} - x_t (dt=1). Cost w_effort*|u|^2 penalizes fast
    // motion so the arm can't teleport. Only free nodes, and only at non-
    // terminal steps (the terminal STATE has no outgoing control - matches the
    // solver, whose terminal_cost omits effort). `vel` is that displacement.
    if (nodeIdx > 0 && vel && !isTerminal) {
      const v2 = vel[0] * vel[0] + vel[1] * vel[1];
      out.effort = { cost: cfg.wEffort * v2, dir: unit(vel) };
      // Super-linear velocity penalty: cost = w * |u|^4 - the hard wall against
      // a node teleporting across the field in one frame.
      out.effortStiffen = { cost: cfg.wEffortStiffen * v2 * v2, dir: unit(vel) };
    }
    // Spring: prev segment (i-1 -> i) should sit at restLength. Force pulls the
    // node toward its neighbour when stretched, pushes away when compressed.
    if (nodeIdx > 0) {
      const q = chain[nodeIdx - 1];
      const rawDev = norm(sub(p, q)) - cfg.restLength;
      // Deadband: a segment may deviate +-springSlack from rest for free.
      const slack = cfg.springSlack || 0;
      const dev = Math.sign(rawDev) * Math.max(0, Math.abs(rawDev) - slack);
      const s = Math.sign(dev);
      const sdir = unit([(q[0] - p[0]) * s, (q[1] - p[1]) * s]);
      out.spring = { cost: cfg.wSpring * dev * dev, dir: sdir };
      // Super-linear spring: cost = w * dev^4 (the dominant deviation cost when
      // a segment is far from rest). Same restoring direction as the linear one.
      out.springStiffen = { cost: cfg.wSpringStiffen * dev * dev * dev * dev,
                            dir: sdir };
    }
    // Bending: straighten toward the neighbours. Force is along the curvature
    // vector (p_{i-1} - 2 p_i + p_{i+1}), pointing at the neighbours' midline.
    if (nodeIdx > 0 && nodeIdx < chain.length - 1) {
      const cx = chain[nodeIdx - 1][0] - 2 * p[0] + chain[nodeIdx + 1][0];
      const cy = chain[nodeIdx - 1][1] - 2 * p[1] + chain[nodeIdx + 1][1];
      // Deadband: a node may bend up to bendDeadzoneDeg for free. The curvature-
      // vector magnitude of that bend at rest spacing is 2*rest*sin(deg/2); only
      // the excess magnitude is penalized (cost = w * excess^2).
      const mag = Math.hypot(cx, cy);
      const dz = 2 * cfg.restLength * Math.sin((cfg.bendDeadzoneDeg || 0) * Math.PI / 360);
      const excess = Math.max(0, mag - dz);
      out.bending = { cost: cfg.wBend * excess * excess, dir: unit([cx, cy]) };
    }
    // PER-NODE attract & repel (node-autonomous sensing). fi is the free-node
    // index (chain[0] is the base). Both are shown for every free node - as 0
    // when the node senses nothing (weight 0) - so every applied term is visible.
    const fi = nodeIdx - 1;
    if (nodeIdx > 0) {
      // Attract: node pulled to ITS OWN sensed target (prey/explore); weight is
      // the recorded sqrt-weight squared. 0 where the node senses nothing.
      const asw = cfg.attractSw ? (cfg.attractSw[fi] || 0) : 0;
      const atgt = cfg.attractTgt && cfg.attractTgt[fi] ? cfg.attractTgt[fi] : p;
      out.attract = asw > 0
        ? { cost: asw * asw * norm(sub(p, atgt)) ** 2, dir: unit(sub(atgt, p)) }
        : { cost: 0, dir: [0, 0] };
      // Repel/flee: node RETRACTS toward the body ("scrunch up") - the force
      // points node -> body (repelTgt is the body centre), NOT away from the
      // threat. Weight scales with threat proximity (0 where it senses none),
      // graded body>tip. Same form as attract, target = body.
      const rsw = cfg.repelSw ? (cfg.repelSw[fi] || 0) : 0;
      const rtgt = cfg.repelTgt && cfg.repelTgt[fi] ? cfg.repelTgt[fi] : p;
      const nFree = chain.length - 1;
      const ratio = 1 + (cfg.repelTipFraction - 1)
        * fi / Math.max(1, nFree - 1);
      out.repel = rsw > 0
        ? { cost: rsw * rsw * ratio * norm(sub(p, rtgt)) ** 2,
            dir: unit(sub(rtgt, p)) }
        : { cost: 0, dir: [0, 0] };
    }
    return out;
  }

  const AnalyzerCore = {
    to255, asTriple, makeLru, prefetchPlan, chainsWithBase, nearestSucker,
    colorErrorStats, clampIdx, playbackAdvance, arrowFor, angleDeg, nodeCosts,
  };
  const root = (typeof window !== "undefined") ? window : globalThis;
  root.AnalyzerCore = AnalyzerCore;
  if (typeof module !== "undefined" && module.exports) module.exports = AnalyzerCore;
})();
</script>

<!-- The JSX source, as type="text/plain" so the browser never runs it AND
     @babel/standalone's auto-runner never touches it (it auto-processes BOTH
     text/babel and text/jsx, either of which would (a) default preset-react to
     the AUTOMATIC JSX runtime — injecting an ES-module `import` a classic
     <script> can't run, "Cannot use import statement outside a module" — and
     (b) double-execute this block. The bootstrap below is the ONLY thing that
     transforms it, with the CLASSIC runtime (JSX -> React.createElement). -->
<script type="text/plain" id="app-src">
const { useState, useEffect, useRef, useCallback } = React;
const C = window.AnalyzerCore;

const WS_DEFAULT = `ws://${location.hostname || "localhost"}:${location.port || 8765}`;

// ---------------------------------------------------------------- helpers ---
function cellSizeFor(xLen, yLen, availW, availH) {
  const s = Math.floor(Math.min(availW / xLen, availH / yLen));
  return Math.max(12, Math.min(40, s || 12));
}

// Draw one frame's world into ctx. `view` carries the anatomy + cellSize +
// overlay options. Reuses the old page's draw code, upgraded for RGB + iLQR.
// Behavior-policy palette, shared by node (sucker outline), limb (centerline)
// and body (head) levels. Codes: 0 idle/resting, 1 exploring/foraging, 2 chasing
// prey, 3 avoiding threat/fleeing, 4 gripping/crawling.
const STATE_COLORS = ["#64748b", "#38bdf8", "#22c55e", "#f43f5e", "#f59e0b"];
const STATE_LABELS = ["idle", "exploring", "chasing prey", "avoiding threat", "gripping"];
function stateColor(code) { return STATE_COLORS[code] || STATE_COLORS[0]; }

// The iLQR weight/config block C.nodeCosts needs, pulled from the run's recorded
// flat config (with the same fallbacks the inspector has always used). The
// per-node sensing arrays (attract/repel tgt+sw) are per-limb and get merged in
// by the caller from limbData.final. Shared by the single-node inspector and the
// per-limb cost table so their reconstructions can't drift apart.
function ilqrWeightCfg(meta) {
  if (!meta) return null;
  const c = meta.config;
  return {
    restLength: c.octo_max_sucker_distance || 0.3,
    wSpring: c.octo_ilqr_w_spring || 2.0,
    wSpringStiffen: c.octo_ilqr_w_spring_stiffen != null ? c.octo_ilqr_w_spring_stiffen : 30.0,
    springSlack: c.octo_ilqr_spring_slack != null ? c.octo_ilqr_spring_slack : 0.25,
    bendDeadzoneDeg: c.octo_ilqr_bend_deadzone_deg != null ? c.octo_ilqr_bend_deadzone_deg : 15.0,
    wEffortStiffen: c.octo_ilqr_w_effort_stiffen != null ? c.octo_ilqr_w_effort_stiffen : 5.0,
    wBend: c.octo_ilqr_w_bend || 1.0,
    wReachRun: c.octo_ilqr_w_reach_run || 0.1,
    wReachTerminal: c.octo_ilqr_w_reach_terminal || 6.0,
    wExplore: c.octo_ilqr_w_explore || 0.5,
    wEffort: c.octo_ilqr_w_effort || 0.1,
    repelTipFraction: c.octo_ilqr_repel_tip_fraction != null ? c.octo_ilqr_repel_tip_fraction : 0.3,
  };
}

// Playback cache sizing. Frame geometry (~50KB/frame) and recency grids (small)
// cache the WHOLE run up to a memory-safe ceiling, so scrubbing/replay stays in
// RAM. iLQR data is heavy (per-iteration trajectories), so it stays a generous
// sliding window around the current frame rather than the whole run.
const FRAME_CACHE_MAX = 2000;    // ~100 MB at ~50KB/frame
const ILQR_CACHE_MAX = 200;      // window; heavy per-frame
const EXPLORE_CACHE_MAX = 2000;  // recency grids are small
// Caps for THIS run: cache all of it if it fits under the ceiling.
function cacheCaps(total) {
  const t = Math.max(1, total | 0);
  return {
    frame: Math.min(t, FRAME_CACHE_MAX),
    ilqr: Math.min(t, ILQR_CACHE_MAX),
    explore: Math.min(t, EXPLORE_CACHE_MAX),
  };
}

// Draw a fleshy CONSTANT-WIDTH limb "skin": a round-capped tube along the
// centerline (no taper - our suckers are uniform), wide enough to enclose the
// suckers, rendered as a translucent fill under a dark outline (like clip-art
// tentacle line-art). halfWorld is the tube half-width in grid cells.
function drawLimbSkin(ctx, chain, cs, halfWorld, outline) {
  if (!chain || chain.length < 2) return;
  const trace = () => {
    ctx.beginPath();
    ctx.moveTo(chain[0].x * cs, chain[0].y * cs);
    for (let i = 1; i < chain.length; i++) ctx.lineTo(chain[i].x * cs, chain[i].y * cs);
  };
  const prevCap = ctx.lineCap, prevJoin = ctx.lineJoin;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  const fillW = 2 * halfWorld * cs;
  // Outline (border) first, then the lighter skin fill on top of it.
  trace(); ctx.strokeStyle = outline; ctx.lineWidth = fillW + 3; ctx.stroke();
  trace(); ctx.strokeStyle = "rgba(236,232,225,0.30)"; ctx.lineWidth = fillW; ctx.stroke();
  ctx.lineCap = prevCap; ctx.lineJoin = prevJoin;
}

function drawWorld(ctx, background, state, view) {
  const cs = view.cellSize;
  const { xLen, yLen } = view;
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

  // Apply zoom/pan transform.
  ctx.save();
  const zm = view.zoom || 1;
  const panX = view.panX || 0, panY = view.panY || 0;
  ctx.translate(panX, panY);
  ctx.scale(zm, zm);

  if (view.showGrid !== false && background) {
    background.forEach((row, y) => {
      row.forEach((cell, x) => {
        const [r, g, b] = C.asTriple(cell);
        ctx.fillStyle = `rgb(${C.to255(r)},${C.to255(g)},${C.to255(b)})`;
        ctx.fillRect(x * cs, y * cs, cs, cs);
      });
    });
    ctx.strokeStyle = "#33415533";
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= xLen; x++) {
      ctx.beginPath(); ctx.moveTo(x * cs, 0); ctx.lineTo(x * cs, yLen * cs); ctx.stroke();
    }
    for (let y = 0; y <= yLen; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * cs); ctx.lineTo(xLen * cs, y * cs); ctx.stroke();
    }
  }

  // Exploration overlay: the per-cell sucker VISIT-COUNT heatmap. Drawn in cell
  // coords (aligned with the background grid, NOT the half-cell entity shift).
  // Warmer/more opaque = more explored; unexplored cells are left clear, so the
  // octopus's coverage (and where it gets stuck) reads at a glance.
  if (view.exploreOverlay && view.explore) {
    drawExploreOverlay(ctx, view.explore, cs, xLen, yLen);
  }

  if (!state) { ctx.restore(); return; }

  // Entities at cell centres: shift by half a cell (commit 089a7ff). Do NOT
  // drop this — suckers would otherwise draw a cell off the surface they match.
  ctx.save();
  ctx.translate(cs / 2, cs / 2);

  const selLimb = view.selectedLimb; // number or "all"
  const hasSelection = selLimb !== "all" && selLimb != null;

  // iLQR overlay (ghost horizon poses + tip path), drawn UNDER the applied
  // pose so plan (ghost) vs applied (solid) reads correctly.
  if (view.ilqr && view.ilqrOverlay) drawIlqrOverlay(ctx, view);

  // Fleshy limb skins (octopus look): a constant-width outlined tube around each
  // arm's centerline, wide enough to enclose its suckers, drawn UNDER the
  // suckers/centerline. Half-width tracks the sucker column spacing.
  if (view.showSkin && state.octopus.limbs) {
    const halfW = Math.max(0.25, (view.suckerColSpacing || 0.1) / 2 + 0.23);
    state.octopus.limbs.forEach((limb, limbIdx) => {
      if (hasSelection && limbIdx !== selLimb) return;
      drawLimbSkin(ctx, limb, cs, halfW, "#141414");
    });
  }

  // Limb centerlines.
  if (view.showCenterlines !== false) {
    ctx.lineWidth = 3;
    const limbStates = state.octopus.limb_states;
    state.octopus.limbs.forEach((limb, limbIdx) => {
      ctx.strokeStyle = hasSelection && limbIdx !== selLimb ? "rgba(255,68,68,0.2)"
        : (view.stateColors && limbStates ? stateColor(limbStates[limbIdx] || 0) : "#ff4444");
      if (limb.length > 1) {
        ctx.beginPath();
        ctx.moveTo(limb[0].x * cs, limb[0].y * cs);
        for (let i = 1; i < limb.length; i++) ctx.lineTo(limb[i].x * cs, limb[i].y * cs);
        ctx.stroke();
      }
    });
  }

  // Head.
  if (view.showHead !== false) {
    const hx = state.octopus.head.x * cs, hy = state.octopus.head.y * cs;
    ctx.fillStyle = hasSelection ? "rgba(255,102,102,0.25)"
      : (view.stateColors && typeof state.octopus.body_state === "number"
         ? stateColor(state.octopus.body_state) : "#ff6666");
    ctx.beginPath();
    ctx.arc(hx, hy, cs * 0.4, 0, 2 * Math.PI);
    ctx.fill();
    if (typeof state.octopus.head.theta === "number") {
      const th = state.octopus.head.theta;
      ctx.strokeStyle = hasSelection ? "rgba(255,230,120,0.4)" : "#ffe678";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx + Math.cos(th) * cs * 0.9, hy + Math.sin(th) * cs * 0.9);
      ctx.stroke();
    }
  }

  // Suckers, colored per the active color mode.
  if (view.showSuckers !== false) {
    state.octopus.suckers.forEach((s) => {
      const dimmed = hasSelection && s.limb != null && s.limb !== selLimb;
      let col = pickSuckerColor(s, view.colorMode);
      if (dimmed) {
        col = col.replace("rgb(", "rgba(").replace(")", ",0.15)");
      }
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(s.x * cs, s.y * cs, cs * 0.15, 0, 2 * Math.PI);
      ctx.fill();
      if (view.showOutlines) {
        // Color the outline by the node's behavior policy when enabled. Give it a
        // dark backing ring so the state colour reads on ANY background - the
        // pale limb "skin" otherwise washes a thin coloured ring out.
        if (view.stateColors && !dimmed) {
          ctx.strokeStyle = "rgba(15,15,18,0.9)";
          ctx.lineWidth = 3.5;
          ctx.stroke();
        }
        ctx.strokeStyle = dimmed ? "rgba(34,34,34,0.15)"
          : (view.stateColors ? stateColor(s.state || 0) : "#222");
        ctx.lineWidth = view.stateColors ? 2.25 : 1;
        ctx.stroke();
      } else {
        // Outlines disabled: stroke in the sucker's OWN fill colour (not grey),
        // so it reads as a clean solid dot with a crisp edge against the skin.
        ctx.strokeStyle = col;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    });

    // Highlighted sucker (inspector hover).
    if (view.hoverSucker != null && state.octopus.suckers[view.hoverSucker]) {
      const s = state.octopus.suckers[view.hoverSucker];
      ctx.strokeStyle = "#facc15";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x * cs, s.y * cs, cs * 0.28, 0, 2 * Math.PI);
      ctx.stroke();
      // Outline the cell this sucker's NODE is attracting toward (prey/explore
      // target), if any. Maps sucker -> its centreline row -> free-node index,
      // then reads the recorded per-node attract target from the iLQR data.
      if (view.ilqr && view.limbRows) {
        const perLimb = view.limbRows * (view.limbCols || 1);
        const limbIdx = s.limb != null ? s.limb : Math.floor(view.hoverSucker / perLimb);
        const fi = ((view.hoverSucker % perLimb) % view.limbRows) - 1; // -1 = base
        const ld = fi >= 0 ? view.ilqr.find((l) => l.limb === limbIdx) : null;
        const tgt = ld && ld.final && ld.final.attract_tgt ? ld.final.attract_tgt[fi] : null;
        const asw = ld && ld.final && ld.final.attract_sw ? (ld.final.attract_sw[fi] || 0) : 0;
        // Prefer the recorded frontier CELL for explore nodes (the real target);
        // fall back to the attract point (prey/threat, or pre-v4 runs).
        const ecell = ld && ld.final && ld.final.explore_cell ? ld.final.explore_cell[fi] : null;
        const cell = ecell || tgt;
        if (cell && asw > 0) {
          const tcx = Math.round(cell[0]), tcy = Math.round(cell[1]);
          ctx.strokeStyle = "#38bdf8";   // sky, matching the exploring policy color
          ctx.lineWidth = 2;
          ctx.strokeRect((tcx - 0.5) * cs, (tcy - 0.5) * cs, cs, cs);
          // a thin line from the sucker to the target cell centre
          ctx.strokeStyle = "rgba(56,189,248,0.5)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(s.x * cs, s.y * cs);
          ctx.lineTo(tcx * cs, tcy * cs);
          ctx.stroke();
        }
      }
    }
  }

  // Agents.
  if (view.showAgents !== false) {
    state.agents.forEach((a, ai) => {
      ctx.fillStyle = a.type === "predator" ? "#ff69b4" : "#32cd32";
      ctx.beginPath();
      ctx.arc(a.x * cs, a.y * cs, cs * 0.2, 0, 2 * Math.PI);
      ctx.fill();
      // Outline (shared "outlines" toggle with the suckers). A hovered agent
      // gets a bright yellow ring regardless, so it's findable.
      if (view.hoverAgent === ai) {
        ctx.strokeStyle = "#facc15";
        ctx.lineWidth = 2.5;
        ctx.stroke();
      } else if (view.showOutlines) {
        // Colour-code by behavior policy: an agent actively PURSUING (threat) or
        // FLEEING (prey) lights up with a bright type-coloured ring; an idle/
        // wandering one gets a dim dark outline.
        if ((a.behavior || 0) !== 0) {
          ctx.strokeStyle = a.type === "predator" ? "#ff69b4" : "#32cd32";
          ctx.lineWidth = 2.75;
        } else {
          ctx.strokeStyle = a.type === "predator" ? "#7a1030" : "#0f4a1a";
          ctx.lineWidth = 1.5;
        }
        ctx.stroke();
      }
      if (view.showSensing) {
        ctx.strokeStyle = a.type === "predator" ? "#ff69b4" : "#32cd32";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(a.x * cs, a.y * cs, (view.sensingRadius || 5) * cs, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });
  }

  // Jet-escape trigger radius around the BODY (a threat inside this fires the
  // siphon jet). Shown with the sensing overlay; amber to match the jet.
  if (view.showSensing && view.jetTriggerRadius && state.octopus.head) {
    const hx = state.octopus.head.x * cs, hy = state.octopus.head.y * cs;
    ctx.strokeStyle = "rgba(245,158,11,0.7)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(hx, hy, view.jetTriggerRadius * cs, 0, 2 * Math.PI);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore(); // cell-centre shift
  ctx.restore(); // zoom/pan transform
}

// One-line description of an agent's behaviour, from its type + the run's agent
// movement mode (meta.config.agent_movement_mode).
function agentBehavior(type, mode) {
  const threat = type === "predator";
  const m = mode || "";
  if (m.includes("PURSUIT_FLEE"))
    return threat ? "pursues once the octopus is visible enough (threshold)"
                  : "flees once the octopus is visible enough (threshold)";
  if (m.includes("SPRING_CHAIN") || m.includes("LUMPED_SPRING"))
    return threat ? "pursues the octopus, scaled by its visibility"
                  : "flees the octopus, scaled by its visibility";
  return "wanders (random walk)";
}

function pickSuckerColor(s, mode) {
  if (mode === "before") { const [r, g, b] = C.asTriple(s.color_before); return `rgb(${C.to255(r)},${C.to255(g)},${C.to255(b)})`; }
  if (mode === "target") { const [r, g, b] = C.asTriple(s.target_color); return `rgb(${C.to255(r)},${C.to255(g)},${C.to255(b)})`; }
  if (mode === "error") {
    const e = C.colorErrorStats(s.color_before, s.color, s.target_color).errAfter;
    const t = Math.min(1, e / 1.0); // 0..1 heat
    return `rgb(${C.to255(t)},${C.to255(1 - t)},0)`;
  }
  const [r, g, b] = C.asTriple(s.color); // "after" (default)
  return `rgb(${C.to255(r)},${C.to255(g)},${C.to255(b)})`;
}

function drawIlqrOverlay(ctx, view) {
  const cs = view.cellSize;
  const selStep = view.ilqrStep; // null = show all, number = highlight one
  const limbs = view.ilqrLimb === "all"
    ? view.ilqr
    : view.ilqr.filter((l) => l.limb === view.ilqrLimb);
  limbs.forEach((limbData) => {
    const iters = limbData.iterations || [];
    if (!iters.length) return;
    const iterIdx = C.clampIdx(view.ilqrIter, iters.length);
    if (view.convergence) {
      iters.forEach((it, k) => {
        const chains = C.chainsWithBase(it.trajectory, limbData.base);
        if (!chains.length) return;
        const terminal = chains[chains.length - 1];
        const t = iters.length > 1 ? k / (iters.length - 1) : 1;
        ctx.strokeStyle = `rgba(${C.to255(1 - t)},${C.to255(t)},80,0.8)`;
        ctx.lineWidth = 1.5;
        strokeChain(ctx, terminal, cs);
      });
      return;
    }
    const it = iters[iterIdx];
    const chains = C.chainsWithBase(it.trajectory, limbData.base);
    // Ghost horizon poses.
    chains.forEach((chain, t) => {
      const selected = selStep != null && t === selStep;
      const dimmed = selStep != null && !selected;
      const a = dimmed ? 0.08 : 0.15 + 0.65 * (t / Math.max(1, chains.length - 1));
      ctx.strokeStyle = selected ? `rgba(56,189,248,0.95)` : `rgba(251,191,36,${a})`;
      ctx.lineWidth = selected ? 3 : 1.5;
      if (t === 0 && !selected) ctx.setLineDash([4, 3]); else ctx.setLineDash([]);
      strokeChain(ctx, chain, cs);
      ctx.setLineDash([]);
      // Draw node dots on selected step.
      if (selected) {
        chain.forEach((pt) => {
          ctx.fillStyle = "#38bdf8";
          ctx.beginPath();
          ctx.arc(pt[0] * cs, pt[1] * cs, cs * 0.1, 0, 2 * Math.PI);
          ctx.fill();
        });
      }
    });
    // Tip path.
    if (chains.length) {
      ctx.strokeStyle = "#22d3ee";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      chains.forEach((chain, t) => {
        const tip = chain[chain.length - 1];
        if (t === 0) ctx.moveTo(tip[0] * cs, tip[1] * cs);
        else ctx.lineTo(tip[0] * cs, tip[1] * cs);
      });
      ctx.stroke();
      const last = chains[chains.length - 1];
      const tip = last[last.length - 1];
      ctx.fillStyle = "#22d3ee";
      ctx.beginPath();
      ctx.arc(tip[0] * cs, tip[1] * cs, cs * 0.12, 0, 2 * Math.PI);
      ctx.fill();
    }
  });
}

function strokeChain(ctx, chain, cs) {
  ctx.beginPath();
  ctx.moveTo(chain[0][0] * cs, chain[0][1] * cs);
  for (let i = 1; i < chain.length; i++) ctx.lineTo(chain[i][0] * cs, chain[i][1] * cs);
  ctx.stroke();
}

// Per-cell sucker visit-RECENCY heatmap. explore is a [y][x] grid of recency
// values (1.0 = touched now, ->0 = long ago, 0 = never); nodes seek the lowest.
// The field ticks down linearly over explore_ticks frames: recently visited
// cells are high, older ones have faded. Ramp each cell from faded
// light orange (low = least recent) to dark saturated orange (high = most
// recent); unexplored cells (0) are left clear so coverage reads at a glance.
function drawExploreOverlay(ctx, explore, cs, xLen, yLen) {
  let maxC = 0;
  for (let y = 0; y < explore.length; y++) {
    const row = explore[y];
    for (let x = 0; x < row.length; x++) if (row[x] > maxC) maxC = row[x];
  }
  if (maxC <= 0) return;
  for (let y = 0; y < yLen && y < explore.length; y++) {
    const row = explore[y];
    for (let x = 0; x < xLen && x < row.length; x++) {
      const v = row[x];
      if (v <= 0) continue;
      const t = v / maxC;                       // 0 = least recent, 1 = most
      // Faded light orange -> dark orange, alpha widening with recency, so the
      // recent/old contrast reads clearly (was a near-flat amber before).
      const r = Math.round(253 + (200 - 253) * t);
      const g = Math.round(200 + (80 - 200) * t);
      const b = Math.round(140 + (0 - 140) * t);
      ctx.fillStyle = `rgba(${r},${g},${b},${0.12 + 0.75 * t})`;
      ctx.fillRect(x * cs, y * cs, cs, cs);
    }
  }
}

// Inline SVG line chart. series: [{data:[...], color, dashed}]; cursor: frame.
function LineChart({ series, cursor, onSeek, height, log }) {
  const width = 340;
  const n = Math.max(1, ...series.map((s) => s.data.length));
  let max = 1e-9, min = 0;
  series.forEach((s) => s.data.forEach((v) => { if (v != null && v > max) max = v; }));
  const yv = (v) => {
    if (log) { const lv = Math.log10(Math.max(v, 1e-6)); const lmin = -6, lmax = Math.log10(Math.max(max, 1e-5)); return height - ((lv - lmin) / (lmax - lmin)) * height; }
    return height - ((v - min) / (max - min || 1)) * height;
  };
  const xv = (i) => (i / Math.max(1, n - 1)) * width;
  return (
    <svg width={width} height={height} style={{ cursor: onSeek ? "crosshair" : "default" }}
         onClick={(e) => { if (!onSeek) return; const r = e.currentTarget.getBoundingClientRect();
           onSeek(Math.round(((e.clientX - r.left) / width) * (n - 1))); }}>
      {series.map((s, k) => (
        <polyline key={k} fill="none" stroke={s.color} strokeWidth="1.5"
          strokeDasharray={s.dashed ? "4,3" : ""}
          points={s.data.map((v, i) => v == null ? "" : `${xv(i)},${yv(v)}`).filter(Boolean).join(" ")} />
      ))}
      {cursor != null && (
        <line x1={xv(cursor)} y1="0" x2={xv(cursor)} y2={height} stroke="#94a3b8" strokeWidth="1" strokeDasharray="2,2" />
      )}
    </svg>
  );
}

// ------------------------------------------------------------------- app ---
function App() {
  const [wsUrl, setWsUrl] = useState(WS_DEFAULT);
  const [connected, setConnected] = useState(false);
  const [tab, setTab] = useState("playback"); // "simulate" | "playback"
  const [runs, setRuns] = useState([]);
  const [meta, setMeta] = useState(null);      // run_meta
  const [frameIdx, setFrameIdx] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [status, setStatus] = useState("disconnected");
  const [sim, setSim] = useState({ frames: 120, running: false, progress: null, label: "" });
  const [colorMode, setColorMode] = useState("after");
  const [showGrid, setShowGrid] = useState(true);
  const [showSensing, setShowSensing] = useState(false);
  const [ilqrOverlay, setIlqrOverlay] = useState(false);
  const [ilqrLimb, setIlqrLimb] = useState("all");
  const [ilqrIter, setIlqrIter] = useState(0);
  const [ilqrStep, setIlqrStep] = useState(null); // null = show all, number = highlight one
  const [convergence, setConvergence] = useState(false);
  const [exploreOverlay, setExploreOverlay] = useState(false); // visit-count heatmap
  const [hover, setHover] = useState(null); // {sucker, frame} inspector
  const [hoverAgent, setHoverAgent] = useState(null); // {agent, frame, cx, cy}
  const [ilqrTick, setIlqrTick] = useState(0); // bump to force re-render when iLQR data arrives
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [showOutlines, setShowOutlines] = useState(true);
  const [stateColors, setStateColors] = useState(true); // colour by behavior policy
  const [showSkin, setShowSkin] = useState(true); // fleshy limb outlines (octopus look)
  const [showCenterlines, setShowCenterlines] = useState(false);
  const [showHead, setShowHead] = useState(true);
  const [showSuckers, setShowSuckers] = useState(true);
  const [showAgents, setShowAgents] = useState(true);
  const [ctxMenu, setCtxMenu] = useState(null); // {x, y} or null
  const [measureMode, setMeasureMode] = useState(false); // ruler tool active
  const [measurePts, setMeasurePts] = useState([]); // up to 2 world pts {wx,wy}
  const dragging = useRef(false);
  const dragStart = useRef({ x: 0, y: 0, panX: 0, panY: 0 });

  const wsRef = useRef(null);
  // ---- setup state (simulate tab) ----
  const [setupGrid, setSetupGrid] = useState({ x: 30, y: 30 });
  const [setupBgImage, setSetupBgImage] = useState(null); // {path, dataUrl}
  const [setupOctoStart, setSetupOctoStart] = useState(null); // {x, y}
  const [setupAgents, setSetupAgents] = useState([]); // [{x, y, type}, ...]
  const [placementTool, setPlacementTool] = useState(null); // "octopus"|"prey"|"predator"
  const bgImgRef = useRef(null); // decoded Image element for preview

  const canvasRef = useRef(null);
  const frameCache = useRef(C.makeLru(400));
  const ilqrCache = useRef(C.makeLru(40));
  const exploreCache = useRef(C.makeLru(60)); // per-frame visit-recency grids
  const lastExploreRef = useRef(null); // last-drawn grid, held while fetching
  const dirtyRef = useRef(true);
  const stateRef = useRef({}); // live-drawn refs (NOT React state churn)
  const pendingReq = useRef(new Map());
  const reqSeq = useRef(0);

  // keep a live snapshot of the pieces the RAF draw loop reads
  stateRef.current.meta = meta;
  stateRef.current.frameIdx = frameIdx;
  stateRef.current.colorMode = colorMode;
  stateRef.current.showGrid = showGrid;
  stateRef.current.showSensing = showSensing;
  stateRef.current.ilqrOverlay = ilqrOverlay;
  stateRef.current.ilqrLimb = ilqrLimb;
  stateRef.current.ilqrIter = ilqrIter;
  stateRef.current.ilqrStep = ilqrStep;
  stateRef.current.convergence = convergence;
  stateRef.current.exploreOverlay = exploreOverlay;
  stateRef.current.hover = hover;
  stateRef.current.hoverAgent = hoverAgent;
  stateRef.current.zoom = zoom;
  stateRef.current.pan = pan;
  stateRef.current.showOutlines = showOutlines;
  stateRef.current.stateColors = stateColors;
  stateRef.current.showSkin = showSkin;
  stateRef.current.showCenterlines = showCenterlines;
  stateRef.current.showHead = showHead;
  stateRef.current.showSuckers = showSuckers;
  stateRef.current.showAgents = showAgents;
  stateRef.current.tab = tab;
  stateRef.current.setupGrid = setupGrid;
  stateRef.current.setupOctoStart = setupOctoStart;
  stateRef.current.setupAgents = setupAgents;
  stateRef.current.placementTool = placementTool;
  stateRef.current.simRunning = sim.running;
  stateRef.current.measurePts = measurePts;

  // ---- websocket ----
  const send = useCallback((type, data, cb) => {
    const ws = wsRef.current;
    if (!ws || ws.readyState !== 1) return;
    const req_id = "r" + (reqSeq.current++);
    if (cb) pendingReq.current.set(req_id, cb);
    ws.send(JSON.stringify({ type, req_id, data: data || {} }));
    return req_id;
  }, []);

  const connect = useCallback(() => {
    if (wsRef.current) { try { wsRef.current.close(); } catch (e) {} }
    let ws;
    try { ws = new WebSocket(wsUrl); } catch (e) { setStatus("bad url"); return; }
    wsRef.current = ws;
    setStatus("connecting");
    ws.onopen = () => { setConnected(true); setStatus("connected"); };
    ws.onclose = () => { setConnected(false); setStatus("disconnected"); };
    ws.onerror = () => setStatus("error");
    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
      handleMessage(msg);
    };
  }, [wsUrl]);

  const handleMessage = useCallback((msg) => {
    const { type, req_id, data } = msg;
    // resolve any request-specific callback first
    if (req_id && pendingReq.current.has(req_id)) {
      const cb = pendingReq.current.get(req_id);
      pendingReq.current.delete(req_id);
      cb(msg);
    }
    if (type === "server_info") {
      send("list_runs", {});
    } else if (type === "runs_list") {
      setRuns(data.runs);
    } else if (type === "simulate_progress") {
      setSim((s) => ({ ...s, progress: data, running: true }));
      // Live preview: render the newest frame's geometry as it arrives (same
      // shape as playback frames). Stashed on the ref the RAF draw loop reads.
      if (data.state) {
        stateRef.current.liveFrame = data.state;
        stateRef.current.liveFrameNum = data.frame;
        dirtyRef.current = true;
      }
    } else if (type === "simulate_complete") {
      setSim((s) => ({ ...s, running: false, progress: null }));
      // draw final_state immediately, then auto-select in playback
      if (data.final_state && data.final_state.octopus) {
        stateRef.current.finalState = data.final_state;
        dirtyRef.current = true;
      }
      send("list_runs", {});
      setTab("playback");
      loadRun(data.run_id);
    } else if (type === "error") {
      setStatus("error: " + data.code);
      console.warn("server error", data);
    } else if (type === "frame_data") {
      frameCache.current.set(data.frame, data.state);
      if (data.ilqr && data.ilqr.length) {
        ilqrCache.current.set(data.frame, data.ilqr);
        setIlqrTick((t) => t + 1); // force React re-render so UI picks up iLQR data
      }
      if (data.explore) exploreCache.current.set(data.frame, data.explore);
      dirtyRef.current = true;
    } else if (type === "frames_data") {
      data.frames.forEach((st) => frameCache.current.set(st.metadata.iteration, st));
      dirtyRef.current = true;
    } else if (type === "run_meta") {
      // handled via callback in loadRun
    } else if (type === "run_renamed") {
      setRuns((prev) => prev.map((r) =>
        r.run_id === data.run_id ? { ...r, label: data.label } : r));
    } else if (type === "image_uploaded" || type === "simulate_started"
               || type === "simulate_cancel_ack") {
      // handled via per-request callbacks
    } else {
      console.log("unhandled message", type, data);
    }
  }, [send]);

  // Auto-connect on mount (checklist item 1): connect once with the default
  // ws url; cleanup closes the socket on unmount. Refs keep it out of the
  // stale-closure reconnect trap the old page fell into.
  useEffect(() => {
    connect();
    return () => { try { wsRef.current && wsRef.current.close(); } catch (e) {} };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ---- run loading ----
  const loadRun = useCallback((runId) => {
    // Release the previous run's cached data immediately; the real caches are
    // sized to THIS run below, once frames_recorded is known.
    frameCache.current = C.makeLru(1);
    ilqrCache.current = C.makeLru(1);
    exploreCache.current = C.makeLru(1);
    lastExploreRef.current = null;   // don't carry a prior run's overlay
    setFrameIdx(0);
    setPlaying(false);
    send("load_run", { run_id: runId }, (msg) => {
      if (msg.type !== "run_meta") return;
      setMeta(msg.data);
      stateRef.current.background = msg.data.background;
      dirtyRef.current = true;
      // Size the caches to this run (cache the whole run if it fits the ceiling),
      // then fetch frame 0 and bulk-fill the rest.
      const caps = cacheCaps(msg.data.frames_recorded);
      frameCache.current = C.makeLru(caps.frame);
      ilqrCache.current = C.makeLru(caps.ilqr);
      exploreCache.current = C.makeLru(caps.explore);
      send("get_frame", { run_id: runId, frame: 0 });
      bulkFill(runId, msg.data.frames_recorded);
    });
  }, [send]);

  const bulkFill = useCallback((runId, total) => {
    // Chunked prefetch of state-only frames into the frame cache (whole run up
    // to the cache ceiling), so scrubbing/replay never re-fetches.
    const CHUNK = 20;
    const cap = cacheCaps(total).frame;
    let start = 0;
    const step = () => {
      if (start >= cap) return;
      send("get_frames", { run_id: runId, start, count: CHUNK });
      start += CHUNK;
      setTimeout(step, 30);
    };
    step();
  }, [send]);

  // ---- fetch a frame on demand + windowed prefetch ----
  const ensureFrame = useCallback((runId, f, total) => {
    if (!frameCache.current.has(f)) send("get_frame", { run_id: runId, frame: f });
    const plan = C.prefetchPlan(f, total - 1, 15, 3, (k) => frameCache.current.has(k));
    plan.slice(0, 6).forEach((k) => send("get_frame", { run_id: runId, frame: k }));
  }, [send]);

  const ensureIlqr = useCallback((runId, f) => {
    if (!ilqrCache.current.has(f)) send("get_frame", { run_id: runId, frame: f, include_ilqr: true });
  }, [send]);

  const ensureExplore = useCallback((runId, f) => {
    if (!exploreCache.current.has(f)) send("get_frame", { run_id: runId, frame: f, include_explore: true });
  }, [send]);

  // ---- effects: fetch current frame + iLQR when scrubbing ----
  useEffect(() => {
    if (!meta) return;
    ensureFrame(meta.run_id, frameIdx, meta.frames_recorded);
    dirtyRef.current = true;
  }, [meta, frameIdx, ensureFrame]);

  useEffect(() => {
    if (!meta || !ilqrOverlay) return;
    ensureIlqr(meta.run_id, frameIdx);
    dirtyRef.current = true;
  }, [meta, frameIdx, ilqrOverlay, ensureIlqr]);

  useEffect(() => {
    if (!meta || !exploreOverlay) return;
    // Fetch the current frame plus a couple ahead so playback rarely outruns the
    // recency grid (the draw loop also holds the last grid to bridge any gap).
    const max = meta.frames_recorded - 1;
    for (let d = 0; d <= 2; d++) ensureExplore(meta.run_id, Math.min(frameIdx + d, max));
    dirtyRef.current = true;
  }, [meta, frameIdx, exploreOverlay, ensureExplore]);

  // Mark dirty when ANY visual toggle changes so the RAF loop redraws.
  useEffect(() => { dirtyRef.current = true; },
    [colorMode, showGrid, showSensing, ilqrOverlay, ilqrLimb, ilqrIter,
     ilqrStep, convergence, zoom, pan, showOutlines, showCenterlines,
     showHead, showSuckers, showAgents, tab, setupGrid, setupOctoStart,
     setupAgents, placementTool, measurePts, measureMode, stateColors, showSkin]);

  // ---- play loop ----
  useEffect(() => {
    if (!playing || !meta) return;
    const iv = setInterval(() => {
      setFrameIdx((idx) => {
        const r = C.playbackAdvance(idx, meta.frames_recorded - 1, 1, false);
        if (!r.playing) setPlaying(false);
        return r.idx;
      });
    }, 120 / speed);
    return () => clearInterval(iv);
  }, [playing, speed, meta]);

  // ---- RAF draw loop (reads refs; no per-frame React state churn) ----
  useEffect(() => {
    let raf;
    const loop = () => {
      raf = requestAnimationFrame(loop);
      if (!dirtyRef.current) return;
      const cv = canvasRef.current;
      const S = stateRef.current;
      if (!cv) { dirtyRef.current = false; return; }
      // Live preview has TOP priority while a simulation is running - even if a
      // previous run is still loaded in playback (S.meta set). Without this the
      // draw loop would fall through to the loaded run and never show the sim.
      if (S.simRunning && S.liveFrame) { dirtyRef.current = false; drawLiveFrame(cv, S); return; }
      // Setup preview: on the simulate tab with no run loaded, OR while a run is
      // starting up (simRunning but no frame yet) - so we never show a stale
      // playback run once the user has kicked off a new simulation.
      if ((S.tab === "simulate" && !S.meta) || S.simRunning) {
        dirtyRef.current = false;
        const g = S.setupGrid || { x: 30, y: 30 };
        const availH = Math.min(window.innerHeight * 0.55, 500);
        const cs = cellSizeFor(g.x, g.y, cv.parentElement.clientWidth - 8, availH);
        cv.width = g.x * cs; cv.height = g.y * cs;
        const ctx = cv.getContext("2d");
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(0, 0, cv.width, cv.height);
        if (bgImgRef.current) {
          ctx.globalAlpha = 0.7;
          ctx.drawImage(bgImgRef.current, 0, 0, cv.width, cv.height);
          ctx.globalAlpha = 1.0;
        }
        // Grid lines
        ctx.strokeStyle = "#33415544";
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= g.x; x++) { ctx.beginPath(); ctx.moveTo(x * cs, 0); ctx.lineTo(x * cs, g.y * cs); ctx.stroke(); }
        for (let y = 0; y <= g.y; y++) { ctx.beginPath(); ctx.moveTo(0, y * cs); ctx.lineTo(g.x * cs, y * cs); ctx.stroke(); }
        ctx.save();
        ctx.translate(cs / 2, cs / 2);
        // Octopus position
        const ox = S.setupOctoStart ? S.setupOctoStart.x : g.x / 2;
        const oy = S.setupOctoStart ? S.setupOctoStart.y : g.y / 2;
        ctx.fillStyle = S.setupOctoStart ? "#ff6666" : "rgba(255,102,102,0.3)";
        ctx.beginPath();
        ctx.arc(ox * cs, oy * cs, cs * 0.5, 0, 2 * Math.PI);
        ctx.fill();
        if (!S.setupOctoStart) {
          ctx.fillStyle = "#94a3b8";
          ctx.font = `${cs * 0.3}px monospace`;
          ctx.textAlign = "center";
          ctx.fillText("octo", ox * cs, oy * cs + cs * 0.1);
        }
        // Placed agents
        (S.setupAgents || []).forEach((a, i) => {
          ctx.fillStyle = a.type === "predator" ? "#ff69b4" : "#32cd32";
          ctx.beginPath();
          ctx.arc(a.x * cs, a.y * cs, cs * 0.3, 0, 2 * Math.PI);
          ctx.fill();
          ctx.fillStyle = "#fff";
          ctx.font = `${cs * 0.25}px monospace`;
          ctx.textAlign = "center";
          ctx.fillText(a.type[0].toUpperCase(), a.x * cs, a.y * cs + cs * 0.08);
        });
        // Cursor hint
        if (S.placementTool) {
          ctx.fillStyle = "#94a3b8";
          ctx.font = "12px monospace";
          ctx.textAlign = "left";
          ctx.fillText(`click to place ${S.placementTool}`, 4, -4);
        }
        ctx.restore();
        return;
      }
      if (!S.meta) {
        if (S.finalState) drawSimFinal(cv, S);
        dirtyRef.current = false;
        return;
      }
      dirtyRef.current = false;
      const m = S.meta;
      const state = frameCache.current.get(S.frameIdx);
      if (!state) return; // wait for fetch; buffering
      const availH = Math.min(window.innerHeight * 0.55, 500);
      const cs = cellSizeFor(m.config.x_len, m.config.y_len, cv.parentElement.clientWidth - 8, availH);
      cv.width = m.config.x_len * cs;
      cv.height = m.config.y_len * cs;
      const ctx = cv.getContext("2d");
      // Hold the last-loaded recency grid while the current frame's is still in
      // flight, so the overlay doesn't blink off (flicker) as playback outruns
      // the async fetch. Fresh grid, when present, replaces the held one.
      let exploreGrid = exploreCache.current.get(S.frameIdx);
      if (S.exploreOverlay) {
        if (exploreGrid) lastExploreRef.current = exploreGrid;
        else exploreGrid = lastExploreRef.current;
      }
      drawWorld(ctx, S.background, state, {
        cellSize: cs, xLen: m.config.x_len, yLen: m.config.y_len,
        colorMode: S.colorMode, showGrid: S.showGrid, showSensing: S.showSensing,
        sensingRadius: m.config.agent_range_radius,
        jetTriggerRadius: m.config.octo_jet_trigger_radius,
        stateColors: S.stateColors,
        showSkin: S.showSkin, suckerColSpacing: m.config.octo_sucker_col_spacing,
        ilqr: ilqrCache.current.get(S.frameIdx), ilqrOverlay: S.ilqrOverlay,
        ilqrLimb: S.ilqrLimb, ilqrIter: S.ilqrIter, ilqrStep: S.ilqrStep,
        convergence: S.convergence,
        hoverSucker: (S.hover && S.hover.frame === S.frameIdx) ? S.hover.sucker : null,
        hoverAgent: (S.hoverAgent && S.hoverAgent.frame === S.frameIdx) ? S.hoverAgent.agent : null,
        selectedLimb: S.ilqrLimb,
        limbRows: m.anatomy.limb_rows, limbCols: m.anatomy.limb_cols,
        explore: exploreGrid, exploreOverlay: S.exploreOverlay,
        zoom: S.zoom, panX: S.pan.x, panY: S.pan.y,
        showOutlines: S.showOutlines,
        showCenterlines: S.showCenterlines,
        showHead: S.showHead,
        showSuckers: S.showSuckers,
        showAgents: S.showAgents,
      });
      drawMeasureOverlay(ctx, S, cs);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  function drawSimFinal(cv, S) {
    const fs = S.finalState;
    const xLen = 30, yLen = 30;
    const cs = cellSizeFor(xLen, yLen, cv.parentElement.clientWidth - 8, 560);
    cv.width = xLen * cs; cv.height = yLen * cs;
    drawWorld(cv.getContext("2d"), null, fs, { cellSize: cs, xLen, yLen, colorMode: "after", showGrid: false });
  }

  // Live preview during a run: draw the newest streamed frame with the same
  // drawWorld path playback uses. Background is null (the surface grid isn't
  // streamed) so the octopus + agents render on a clean canvas; the suckers
  // still carry their camouflage colours. Honours the same view toggles.
  function drawLiveFrame(cv, S) {
    const g = S.setupGrid || { x: 30, y: 30 };
    const availH = Math.min(window.innerHeight * 0.55, 500);
    const cs = cellSizeFor(g.x, g.y, cv.parentElement.clientWidth - 8, availH);
    cv.width = g.x * cs; cv.height = g.y * cs;
    drawWorld(cv.getContext("2d"), null, S.liveFrame, {
      cellSize: cs, xLen: g.x, yLen: g.y,
      colorMode: S.colorMode, showGrid: S.showGrid, showSensing: S.showSensing,
      sensingRadius: (S.meta && S.meta.config.agent_range_radius) || 0,
      stateColors: S.stateColors,
      showSkin: S.showSkin,
      suckerColSpacing: (S.meta && S.meta.config.octo_sucker_col_spacing) || 0.1,
      zoom: S.zoom, panX: S.pan.x, panY: S.pan.y,
      showOutlines: S.showOutlines, showCenterlines: S.showCenterlines,
      showHead: S.showHead, showSuckers: S.showSuckers, showAgents: S.showAgents,
    });
    drawMeasureOverlay(cv.getContext("2d"), S, cs);
  }

  // Ruler overlay: the measure tool's two world points, the segment between
  // them, and a distance/angle label. Dots + line are drawn in the same
  // zoom/pan transform as the world so they track pan/zoom; the label is drawn
  // in screen space so it stays legible. Angle uses the sim convention
  // (atan2(dy, dx) with world y increasing downward), matching node angles.
  function drawMeasureOverlay(ctx, S, cs) {
    const pts = S.measurePts || [];
    if (!pts.length) return;
    const zm = S.zoom || 1, px = (S.pan && S.pan.x) || 0, py = (S.pan && S.pan.y) || 0;
    const sx = (p) => (p.wx + 0.5) * cs, sy = (p) => (p.wy + 0.5) * cs;
    ctx.save();
    ctx.translate(px, py); ctx.scale(zm, zm);
    ctx.strokeStyle = "#fbbf24"; ctx.fillStyle = "#fbbf24"; ctx.lineWidth = 1.5 / zm;
    if (pts.length === 2) {
      ctx.beginPath(); ctx.moveTo(sx(pts[0]), sy(pts[0])); ctx.lineTo(sx(pts[1]), sy(pts[1])); ctx.stroke();
    }
    pts.forEach((p) => {
      ctx.beginPath(); ctx.arc(sx(p), sy(p), 4 / zm, 0, 2 * Math.PI); ctx.fill();
    });
    ctx.restore();
    if (pts.length === 2) {
      const dx = pts[1].wx - pts[0].wx, dy = pts[1].wy - pts[0].wy;
      const dist = Math.hypot(dx, dy), ang = Math.atan2(dy, dx) * 180 / Math.PI;
      const mx = px + zm * ((0.5 * (pts[0].wx + pts[1].wx) + 0.5) * cs);
      const my = py + zm * ((0.5 * (pts[0].wy + pts[1].wy) + 0.5) * cs);
      const txt = `${dist.toFixed(2)} u   ${ang.toFixed(1)}°`;
      ctx.font = "bold 13px monospace"; ctx.textAlign = "left";
      const w = ctx.measureText(txt).width;
      ctx.fillStyle = "rgba(15,23,42,0.85)"; ctx.fillRect(mx + 8, my - 17, w + 8, 19);
      ctx.fillStyle = "#fbbf24"; ctx.fillText(txt, mx + 12, my - 3);
    }
  }

  // ---- keyboard ----
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      const max = meta ? meta.frames_recorded - 1 : 0;
      const k = e.key;
      if (k === " ") { e.preventDefault(); setPlaying((p) => !p); }
      else if (k === "ArrowRight") setFrameIdx((i) => C.clampIdx(i + (e.shiftKey ? 10 : 1), max + 1));
      else if (k === "ArrowLeft") setFrameIdx((i) => C.clampIdx(i - (e.shiftKey ? 10 : 1), max + 1));
      else if (k === "Home") setFrameIdx(0);
      else if (k === "End") setFrameIdx(max);
      else if (k === "[") setIlqrIter((i) => Math.max(0, i - 1));
      else if (k === "]") setIlqrIter((i) => i + 1);
      else if (k === "{") setIlqrStep((s) => s == null ? 0 : Math.max(0, s - 1));
      else if (k === "}") setIlqrStep((s) => { const h = meta ? (meta.config.octo_ilqr_horizon || 10) : 10; return s == null ? 0 : Math.min(h, s + 1); });
      else if (k === "|") setIlqrStep(null);
      else if (k === "i" || k === "I") setIlqrOverlay((v) => !v);
      else if (k === "l" || k === "L") setIlqrLimb((v) => v === "all" ? 0 : (v + 1 > 7 ? "all" : v + 1));
      else if (k === "a" || k === "A") setIlqrLimb("all");
      else if (k === "v" || k === "V") setConvergence((v) => !v);
      else if (k === "c" || k === "C") setColorMode((m) => ({ after: "before", before: "target", target: "error", error: "after" }[m]));
      else if (k === "g" || k === "G") setShowGrid((v) => !v);
      else if (k === "d" || k === "D") setShowSensing((v) => !v);
      else if (k === "o" || k === "O") setShowOutlines((v) => !v);
      else if (k === "m" || k === "M") { setMeasureMode((v) => !v); setMeasurePts([]); }
      else if (k === "0") { setZoom(1); setPan({ x: 0, y: 0 }); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [meta]);

  // ---- simulate ----
  const startSimulate = () => {
    setSim((s) => ({ ...s, running: true, progress: null }));
    // Drop any prior run's live frame so this run starts from the placement
    // preview and doesn't flash the previous octopus until frame 1 arrives.
    stateRef.current.liveFrame = null;
    stateRef.current.liveFrameNum = null;
    stateRef.current.simRunning = true;   // ref may lag the setSim re-render
    dirtyRef.current = true;               // redraw now (show setup preview)
    const configOverrides = { x_len: setupGrid.x, y_len: setupGrid.y };
    if (setupBgImage) configOverrides.background_image = setupBgImage.path;
    const setup = {};
    if (setupOctoStart) setup.octo_start = [setupOctoStart.x, setupOctoStart.y];
    if (setupAgents.length > 0) setup.agent_positions = setupAgents;
    send("simulate", {
      num_frames: sim.frames, record_ilqr_history: true,
      label: sim.label || "",
      config: configOverrides,
      setup: Object.keys(setup).length > 0 ? setup : undefined,
    });
  };
  const cancelSimulate = () => send("simulate_cancel", {});

  // ---- image upload ----
  const onImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      // Send base64 to server (strip data:...;base64, prefix)
      const b64 = dataUrl.split(",")[1];
      send("upload_image", { filename: file.name, content_b64: b64 }, (msg) => {
        if (msg.type === "image_uploaded") {
          setSetupBgImage({ path: msg.data.path, dataUrl });
          // Load as Image for preview canvas
          const img = new Image();
          img.onload = () => { bgImgRef.current = img; dirtyRef.current = true; };
          img.src = dataUrl;
        }
      });
    };
    reader.readAsDataURL(file);
  };

  // ---- setup preview click (placement) ----
  const onSetupClick = (e) => {
    if (!placementTool) return;
    const cv = canvasRef.current;
    const rect = cv.getBoundingClientRect();
    const cs = cv.width / setupGrid.x;
    const wx = Math.max(0, Math.min(setupGrid.x - 1,
      (e.clientX - rect.left) / cs - 0.5));
    const wy = Math.max(0, Math.min(setupGrid.y - 1,
      (e.clientY - rect.top) / cs - 0.5));
    const cx = Math.round(wx * 10) / 10;
    const cy = Math.round(wy * 10) / 10;
    if (placementTool === "octopus") {
      setSetupOctoStart({ x: cx, y: cy });
      setPlacementTool(null);
    } else {
      setSetupAgents((prev) => [...prev, { x: cx, y: cy, type: placementTool }]);
    }
  };

  // ---- zoom/pan handlers ----
  const onWheel = (e) => {
    e.preventDefault();
    const cv = canvasRef.current;
    const rect = cv.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    setZoom((z) => {
      const nz = Math.max(0.5, Math.min(10, z * factor));
      // Adjust pan so the point under the mouse stays fixed.
      setPan((p) => ({
        x: mx - (mx - p.x) * (nz / z),
        y: my - (my - p.y) * (nz / z),
      }));
      return nz;
    });
  };
  // Map a mouse event to world coords, honouring cell size + zoom/pan. Uses the
  // playback grid when a run is loaded, else the setup grid (live/preview).
  const screenToWorld = (e) => {
    const cv = canvasRef.current;
    if (!cv) return null;
    const rect = cv.getBoundingClientRect();
    const xLen = meta ? meta.config.x_len : ((setupGrid && setupGrid.x) || 30);
    const cs = cv.width / xLen;
    return {
      wx: (e.clientX - rect.left - pan.x) / zoom / cs - 0.5,
      wy: (e.clientY - rect.top - pan.y) / zoom / cs - 0.5,
    };
  };
  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    // Measure tool: click point A then B (a 3rd click starts a new measurement);
    // record world coords instead of starting a pan-drag.
    if (measureMode) {
      const p = screenToWorld(e);
      if (p) {
        setMeasurePts((pts) => (pts.length >= 2 ? [p] : [...pts, p]));
        dirtyRef.current = true;
      }
      return;
    }
    dragging.current = true;
    dragStart.current = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
  };
  const onMouseUp = () => { dragging.current = false; };

  // ---- mouse hover for inspector + drag ----
  const onCanvasMove = (e) => {
    if (dragging.current) {
      const dx = e.clientX - dragStart.current.x;
      const dy = e.clientY - dragStart.current.y;
      setPan({ x: dragStart.current.panX + dx, y: dragStart.current.panY + dy });
      return;
    }
    if (!meta) return;
    const state = frameCache.current.get(frameIdx);
    if (!state) return;
    const cv = canvasRef.current;
    const rect = cv.getBoundingClientRect();
    const cs = cv.width / meta.config.x_len;
    // Account for zoom/pan when mapping mouse to world coords.
    const zm = zoom;
    const px = (e.clientX - rect.left - pan.x) / zm;
    const py = (e.clientY - rect.top - pan.y) / zm;
    const wx = px / cs - 0.5;
    const wy = py / cs - 0.5;
    // Agents take priority over suckers (they're distinct dots). nearestSucker
    // just finds the nearest {x,y}, so it works for agents too.
    const ai = C.nearestSucker(state.agents, wx, wy, 0.6);
    if (ai >= 0) {
      setHoverAgent({ agent: ai, frame: frameIdx, cx: e.clientX, cy: e.clientY });
      setHover(null);
    } else {
      setHoverAgent(null);
      // When a single limb is selected in the overlay, only ITS suckers are
      // hoverable (the rest are dimmed out and shouldn't grab the inspector).
      let limbFilter = null;
      if (ilqrLimb !== "all") {
        const sPerLimb = meta.anatomy.limb_rows * meta.anatomy.limb_cols;
        limbFilter = (s, i) =>
          (s.limb != null ? s.limb : Math.floor(i / sPerLimb)) === ilqrLimb;
      }
      const si = C.nearestSucker(state.octopus.suckers, wx, wy, 1.0, limbFilter);
      setHover(si >= 0 ? { sucker: si, frame: frameIdx } : null);
      // Ensure this frame's iLQR data is loaded so the hover can show the node's
      // attract-target cell (and the cost panel) without needing the overlay on.
      if (si >= 0 && meta && meta.has_ilqr_history) ensureIlqr(meta.run_id, frameIdx);
    }
    dirtyRef.current = true;
  };
  const resetView = () => { setZoom(1); setPan({ x: 0, y: 0 }); };

  // ---- right-click context menu ----
  const onContextMenu = (e) => {
    e.preventDefault();
    setCtxMenu({ x: e.clientX, y: e.clientY });
  };
  useEffect(() => {
    if (!ctxMenu) return;
    const handler = () => setCtxMenu(null);
    window.addEventListener("click", handler);
    return () => window.removeEventListener("click", handler);
  }, [ctxMenu]);

  const visToggles = [
    ["Surface grid",   showGrid,        setShowGrid],
    ["Centerlines",    showCenterlines,  setShowCenterlines],
    ["Suckers",        showSuckers,      setShowSuckers],
    ["Sucker outlines",showOutlines,     setShowOutlines],
    ["Head",           showHead,         setShowHead],
    ["Agents",         showAgents,       setShowAgents],
    ["Sensing radius", showSensing,      setShowSensing],
    ["iLQR overlay",   ilqrOverlay,      setIlqrOverlay],
  ];

  const curFrame = meta ? frameCache.current.get(frameIdx) : null;
  const curIlqr = meta ? ilqrCache.current.get(frameIdx) : null;
  const maxFrame = meta ? meta.frames_recorded - 1 : 0;

  // ---- render ----
  return (
    <div className="min-h-screen p-3" style={{ fontFamily: "ui-monospace, monospace" }}>
      {/* top bar */}
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <span className="text-sky-400 font-bold">🐙 Octopus Analyzer</span>
        <input className="bg-slate-800 px-2 py-1 rounded text-xs w-56" value={wsUrl}
               onChange={(e) => setWsUrl(e.target.value)} />
        <button className="bg-sky-700 px-3 py-1 rounded text-xs" onClick={connect}>
          {connected ? "Reconnect" : "Connect"}</button>
        <span className={"text-xs " + (connected ? "text-green-400" : "text-red-400")}>● {status}</span>
        <div className="ml-4 flex gap-1">
          {["simulate", "playback"].map((t) => (
            <button key={t} onClick={() => setTab(t)}
              className={"px-3 py-1 rounded text-xs " + (tab === t ? "bg-sky-600" : "bg-slate-700")}>{t}</button>
          ))}
        </div>
        {meta && (
          <span className="ml-4 text-xs text-slate-300">
            {meta.label || meta.run_id.slice(-6)} · frame {frameIdx}/{maxFrame}
            {curFrame && <> · vis {curFrame.metadata.visibility_score} · prey {curFrame.metadata.prey_captured}</>}
          </span>
        )}
      </div>

      <div className="flex gap-3">
        {/* canvas + transport */}
        <div className="flex-1 min-w-0">
          <div className="bg-black rounded p-1 overflow-hidden"
               style={{ cursor: (tab === "simulate" && placementTool) ? "crosshair" : (dragging.current ? "grabbing" : "grab") }}>
            <canvas ref={canvasRef} style={{ display: "block", cursor: measureMode ? "crosshair" : "default" }}
                    onMouseMove={onCanvasMove}
                    onClick={tab === "simulate" && placementTool && !measureMode ? onSetupClick : undefined}
                    onMouseDown={onMouseDown} onMouseUp={onMouseUp}
                    onMouseLeave={() => { setHover(null); setHoverAgent(null); dragging.current = false; }}
                    onWheel={onWheel} onContextMenu={onContextMenu} />
          </div>

          {/* agent hover tooltip */}
          {hoverAgent && curFrame && curFrame.agents[hoverAgent.agent] && (() => {
            const a = curFrame.agents[hoverAgent.agent];
            const threat = a.type === "predator";
            const speed = Math.hypot(a.vx || 0, a.vy || 0);
            const mode = meta.config.agent_movement_mode || "";
            const senseR = meta.config.agent_range_radius || 5;
            // Is the octopus within THIS agent's sense window right now? Agents
            // react to the nearest SUCKER (the octopus's physical extent).
            let minD = Infinity;
            (curFrame.octopus.suckers || []).forEach((s) => {
              const d = Math.hypot(s.x - a.x, s.y - a.y);
              if (d < minD) minD = d;
            });
            // Use the RECORDED per-agent behavior (1 pursuing, 2 fleeing, 0
            // idle) as the source of truth; distance/mode only explain WHY it's
            // idle. (Pre-v5 runs record 0 -> always reads "wandering".)
            const beh = a.behavior || 0;
            const acting = beh !== 0;
            const action = beh === 1 ? "▸ PURSUING the octopus"
              : beh === 2 ? "▸ FLEEING the octopus"
              : mode.includes("RANDOM") ? "▸ wandering (random walk)"
              : minD > senseR ? "▸ wandering — octopus out of range"
              : "▸ wandering — octopus camouflaged";
            return (
              <div className="fixed z-50 bg-slate-800 border border-slate-600 rounded shadow-lg px-3 py-2 text-xs pointer-events-none"
                   style={{ left: hoverAgent.cx + 14, top: hoverAgent.cy + 14, maxWidth: 260 }}>
                <div className="font-bold mb-1" style={{ color: threat ? "#ff69b4" : "#32cd32" }}>
                  {threat ? "THREAT (predator)" : "PREY"} <span className="text-slate-500 font-normal">#{a.id}</span>
                </div>
                <div style={{ color: acting ? (threat ? "#ff69b4" : "#32cd32") : "#94a3b8" }}>{action}</div>
                <div className="text-slate-400 mt-1">octopus {minD === Infinity ? "?" : minD.toFixed(1)} away · senses ≤ {senseR}</div>
                <div className="text-slate-500">policy: {agentBehavior(a.type, mode)}</div>
                <div className="text-slate-400 mt-1">speed {speed.toFixed(3)} · max {meta.config.agent_max_velocity}</div>
                <div className="text-slate-400">pos ({a.x.toFixed(1)}, {a.y.toFixed(1)})</div>
              </div>
            );
          })()}

          {/* right-click context menu */}
          {ctxMenu && (
            <div className="fixed z-50 bg-slate-800 border border-slate-600 rounded shadow-lg py-1 text-xs"
                 style={{ left: ctxMenu.x, top: ctxMenu.y }}>
              {visToggles.map(([label, val, setter]) => (
                <button key={label}
                  className="block w-full text-left px-3 py-1 hover:bg-slate-700 flex items-center gap-2"
                  onClick={(e) => { e.stopPropagation(); setter((v) => !v); setCtxMenu(null); }}>
                  <span style={{ width: 14, display: "inline-block" }}>{val ? "✓" : ""}</span>
                  {label}
                </button>
              ))}
              <div className="border-t border-slate-600 my-1" />
              <button className="block w-full text-left px-3 py-1 hover:bg-slate-700"

          {meta && tab === "playback" && (

                     defaultValue={meta.label || ""}

                     onKeyDown={(e) => {

            <div className="bg-slate-900 p-3 rounded">
              {(() => {
                const s = curFrame.octopus.suckers[hover.sucker];
                const limbRows = meta ? meta.anatomy.limb_rows : 16;
                const limbCols = meta ? meta.anatomy.limb_cols : 2;
                const suckersPerLimb = limbRows * limbCols;
                const limbIdx = s.limb != null ? s.limb : Math.floor(hover.sucker / suckersPerLimb);
                const localIdx = hover.sucker % suckersPerLimb;
                const nodeIdx = localIdx % limbRows;
                return (<>
                  <div className="font-bold mb-2 text-sky-400">
                    Sucker #{hover.sucker} <span className="text-slate-500 font-normal">limb {limbIdx} · node {nodeIdx}</span>
                  </div>
                  {[["before", s.color_before], ["after", s.color], ["target", s.target_color]].map(([label, c]) => {

                      <div key={label} className="flex items-center gap-2 mb-1">

                      </div>
                    );
                  })}
                  {/* Per-node iLQR cost breakdown */}
                  {curIlqr && (() => {
                    const limbData = curIlqr.find((l) => l.limb === limbIdx);
                    if (!limbData || !limbData.iterations || !limbData.iterations.length) return null;
                    const iterIdx = C.clampIdx(ilqrIter, limbData.iterations.length);
                    const it = limbData.iterations[iterIdx];
                    const chains = C.chainsWithBase(it.trajectory, limbData.base);
                    if (!chains.length) return null;
                    const step = ilqrStep != null ? C.clampIdx(ilqrStep, chains.length) : chains.length - 1;
                    const chain = chains[step];
                    // nodeIdx in chain: 0=base, so chain index = nodeIdx
                    const ci = C.clampIdx(nodeIdx, chain.length);
                    const cfg = meta ? {
                      ...ilqrWeightCfg(meta),
                      // Per-node sensing arrays (node-autonomous attract/repel).
                      attractTgt: limbData.final.attract_tgt,
                      attractSw: limbData.final.attract_sw,
                      repelTgt: limbData.final.repel_tgt,
                      repelSw: limbData.final.repel_sw,
                    } : null;
                    if (!cfg) return null;
                    const isTerminal = step === chains.length - 1;
                    // Node velocity at this step = displacement to the next step
                    // (the control u the effort term penalizes); null at terminal.
                    const vel = !isTerminal
                      ? [chains[step + 1][ci][0] - chain[ci][0],
                         chains[step + 1][ci][1] - chain[ci][1]]
                      : null;
                    const costs = C.nodeCosts(chain, ci, cfg, isTerminal, vel);
                    const entries = Object.entries(costs);
                    if (!entries.length) return null;
                    return (
                      <div className="mt-2 border-t border-slate-700 pt-2">
                        <div className="text-slate-400 mb-1">iLQR costs · iter {iterIdx} · step {step} · node {ci}{isTerminal ? " (terminal)" : ""} · senses {(() => {
                          const fi = ci - 1;
                          const asw2 = cfg.attractSw ? (cfg.attractSw[fi] || 0) ** 2 : 0;
                          // Prey uses w_reach_terminal, explore uses w_explore; pick the nearer.
                          const a = asw2 > 0 ? (Math.abs(asw2 - cfg.wReachTerminal) <= Math.abs(asw2 - cfg.wExplore) ? "prey" : "explore") : null;
                          const r = cfg.repelSw && cfg.repelSw[fi] > 0;
                          return [a, r && "threat"].filter(Boolean).join("+") || "nothing";
                        })()}</div>
                        {entries.map(([name, { cost, dir }]) => (
                          <div key={name} className="flex justify-between">
                            <span>{name} <span className="text-slate-500">{C.arrowFor(dir[0], dir[1])} {C.angleDeg(dir[0], dir[1])}°</span></span>
                            <span className="text-slate-400">{cost.toFixed(4)}</span>
                          </div>
                        ))}
                        <div className="flex justify-between font-bold mt-1 border-t border-slate-700 pt-1">
                          <span>total</span>
                          <span>{entries.reduce((s, [, v]) => s + v.cost, 0).toFixed(4)}</span>
                        </div>
                      </div>
                    );
                  })()}
                </>);
              })()}
            </div>
          )}

          {/* per-limb node cost table: when a single limb is selected in the

              breakdown + motor state, so the whole arm reads at a glance

          {ilqrLimb !== "all" && meta && curFrame && curIlqr && (() => {
            const limbData = curIlqr.find((l) => l.limb === ilqrLimb);

            const iterIdx = C.clampIdx(ilqrIter, limbData.iterations.length);
            const it = limbData.iterations[iterIdx];
            const chains = C.chainsWithBase(it.trajectory, limbData.base);
            if (!chains.length) return null;
            const step = ilqrStep != null ? C.clampIdx(ilqrStep, chains.length) : chains.length - 1;
            const chain = chains[step];
            const isTerminal = step === chains.length - 1;
            const cfg = {
              ...ilqrWeightCfg(meta),
              attractTgt: limbData.final.attract_tgt,
              attractSw: limbData.final.attract_sw,
              repelTgt: limbData.final.repel_tgt,
              repelSw: limbData.final.repel_sw,
            };
            // Per-node motor state (0..4): the suckers on a node share it, so read
            // it off this limb's suckers (node index = local sucker row).
            const limbRows = meta.anatomy.limb_rows;
            const suckersPerLimb = limbRows * meta.anatomy.limb_cols;
            const nodeStates = new Array(chain.length).fill(0);
            curFrame.octopus.suckers.forEach((s, gi) => {
              const li = s.limb != null ? s.limb : Math.floor(gi / suckersPerLimb);
              if (li !== ilqrLimb) return;
              const ni = (gi % suckersPerLimb) % limbRows;
              if (s.state != null && ni < nodeStates.length) nodeStates[ni] = s.state;
            });
            const rows = [];
            for (let ci = 1; ci < chain.length; ci++) {
              const vel = !isTerminal
                ? [chains[step + 1][ci][0] - chain[ci][0],
                   chains[step + 1][ci][1] - chain[ci][1]]
                : null;
              const costs = C.nodeCosts(chain, ci, cfg, isTerminal, vel);
              const g = (k) => (costs[k] ? costs[k].cost : 0);
              const total = Object.values(costs).reduce((a, v) => a + v.cost, 0);
              rows.push({
                ci, st: nodeStates[ci] || 0,
                spring: g("spring") + g("springStiffen"), bend: g("bending"),
                attract: g("attract"), repel: g("repel"),
                effort: g("effort") + g("effortStiffen"), total,
              });
            }
            // Dominant applied term per row, to tint the total (what's driving it).
            const num = (v) => v > 1e-4
              ? <span className="text-slate-300">{v.toFixed(2)}</span>
              : <span className="text-slate-700">·</span>;
            return (
              <div className="bg-slate-900 p-3 rounded">
                <div className="font-bold mb-2 text-sky-400">
                  limb {ilqrLimb} nodes{" "}
                  <span className="text-slate-500 font-normal">
                    iter {iterIdx} · step {step}{isTerminal ? " (terminal)" : ""} · base→tip
                  </span>
                </div>
                <div className="overflow-x-auto">
                <table className="w-full text-[10px] tabular-nums">
                  <thead>
                    <tr className="text-slate-500 text-left">
                      <th className="pr-1 font-normal">#</th>
                      <th className="pr-1 font-normal">st</th>
                      <th className="text-right pl-1 font-normal">spring</th>
                      <th className="text-right pl-1 font-normal">bend</th>
                      <th className="text-right pl-1 font-normal">attr</th>
                      <th className="text-right pl-1 font-normal">repel</th>
                      <th className="text-right pl-1 font-normal">eff</th>
                      <th className="text-right pl-1">total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((r) => (
                      <tr key={r.ci} className="border-t border-slate-800">
                        <td className="pr-1 text-slate-400">{r.ci}</td>
                        <td className="pr-1">
                          <span className="inline-block w-2 h-2 rounded-sm align-middle"
                                style={{ background: stateColor(r.st) }}
                                title={STATE_LABELS[r.st]}></span>
                        </td>
                        <td className="text-right pl-1">{num(r.spring)}</td>
                        <td className="text-right pl-1">{num(r.bend)}</td>
                        <td className="text-right pl-1">{num(r.attract)}</td>
                        <td className="text-right pl-1">{num(r.repel)}</td>
                        <td className="text-right pl-1">{num(r.effort)}</td>
                        <td className="text-right pl-1 font-bold text-slate-200">{r.total.toFixed(2)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                </div>
                <div className="mt-2 flex flex-wrap gap-x-2 gap-y-0.5 text-[10px] text-slate-500">
                  {STATE_LABELS.map((label, i) => (
                    <span key={i} className="inline-flex items-center gap-1">
                      <span className="inline-block w-2 h-2 rounded-sm"
                            style={{ background: stateColor(i) }}></span>{label}
                    </span>
                  ))}
                </div>
              </div>
            );
          })()}

          <div className="bg-slate-900 p-3 rounded text-slate-400">
            <div className="font-bold mb-1 text-slate-300">keys</div>
            <div><kbd>Space</kbd> play · <kbd>←/→</kbd> ±1 · <kbd>Shift+←/→</kbd> ±10</div>
            <div><kbd>[</kbd><kbd>]</kbd> iter · <kbd>{"{"}</kbd><kbd>{"}"}</kbd> step · <kbd>|</kbd> all steps · <kbd>I</kbd> overlay · <kbd>L</kbd> limb</div>
            <div><kbd>V</kbd> converge · <kbd>C</kbd> color mode · <kbd>G</kbd> grid · <kbd>D</kbd> sensing</div>
            <div><kbd>O</kbd> outlines · <kbd>M</kbd> measure · <kbd>0</kbd> reset view · scroll = zoom · drag = pan</div>
            <div className="mt-1">color mode: <span className="text-sky-400">{colorMode}</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
